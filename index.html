<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="A to-do list for adding and deleting tasks.">
	<meta property="og:title" content="To-do List">
	<meta property="og:description" content="A to-do list for adding and deleting tasks.">
	<meta property="og:image" content="https://htm823.github.io/todo-list/to-do.png">
	<meta property="og:url" content="https://htm823.github.io/todo-list/">
	<meta property="og:type" content="website">
	<meta property="og:site_name" content="To-do List">
	<meta name="twitter:card" content="summary_large_image">

	<link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
	<link rel="stylesheet" href="style.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Tinos:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

	<title>To-do List</title>
</head>

<body>
	<header class="header">
		<div class="header__inner container">
			<img src="img/icon.png" alt="Calendar Check Logo" class="header__logo">
			<h1 class="header__title">To-do List</h1>
		</div>
	</header>
	<main>
		<div class="dashboard container">
			<section id="task" class="task-board">
				<div class="task-board__header">
					<h2 class="task-board__title">Task</h2>
					<button id="clear-btn" type="button" class="task-board__clear-btn"><i class="fa-solid fa-trash-can"></i></button>
				</div>
				<ul id="task-list" class="task-board__task-list"></ul>
			</section>
			<section id="new-task" class="add-task">
				<h2 class="add-task__title">Create a new task</h2>
				<form id="add-form" class="add-task__form">
					<div class="add-task__input">
						<input type="text" id="task-input" class="add-task__box" name="task" placeholder="Add a new task here" maxlength="20" autocomplete="off" required>
						<button id="add-btn" type="button" class="add-task__btn"><i class="fa-solid fa-plus"></i></button>
					</div>
				</form>
			</section>
		</div>
	</main>
	<footer class="footer">
		<div class="footer__inner container">
			<small class="footer__copyright">
				&copy; 2026 To-do List
			</small>
		</div>
	</footer>
	<script src="main.js"></script>
</body>

</html>
